services:
  daft-monitor:
    build: .
    container_name: daft-monitor-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml:ro
    environment:
      DAFT_MONITOR_CONFIG: /app/config.yaml
      DAFT_MONITOR_ENVIRONMENT: dev
      DAFT_MONITOR_LOG_LEVEL: debug
      DAFT_MONITOR_WRITE_LOGS: "true"
      DAFT_MONITOR_LOG_DIR: /app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
